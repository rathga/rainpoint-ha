run_zone:
  name: Run zone
  description: >
    Start a RainPoint zone switch for a specific duration in minutes,
    bypassing the companion ``number.*_run_minutes`` slider. Useful from
    scripts/automations that want explicit control.
  fields:
    entity_id:
      name: Zone switch
      description: The switch entity for the zone to run.
      required: true
      selector:
        entity:
          integration: rainpoint
          domain: switch
    duration:
      name: Duration
      description: Run duration in minutes (1–720 — i.e. up to 12 h).
      required: true
      selector:
        number:
          min: 1
          max: 720
          step: 1
          unit_of_measurement: min
          mode: box

force_off:
  name: Force off (local)
  description: >
    Locally clear stuck "running" state without hitting the API. Use
    when HomGar's HTTP cache reports a valve as running but the phone
    app (and the actual valve) say otherwise — calling switch.turn_off
    in that case would just hit the same stale cache. This service
    only flips HA's local state; the next genuine status update will
    overwrite it.
  fields:
    entity_id:
      name: Zone switch
      description: The switch entity to clear.
      required: true
      selector:
        entity:
          integration: rainpoint
          domain: switch
