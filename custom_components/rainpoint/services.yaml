run_zone:
  name: Run zone
  description: >
    Start a RainPoint zone switch for a specific duration in seconds,
    bypassing the companion ``number.*_run_minutes`` slider. Useful from
    scripts/automations that want explicit control.
  fields:
    entity_id:
      name: Zone switch
      description: The switch entity for the zone to run.
      required: true
      selector:
        entity:
          integration: rainpoint
          domain: switch
    duration:
      name: Duration
      description: Run duration in seconds (minimum 60, maximum 7200).
      required: true
      selector:
        number:
          min: 60
          max: 7200
          step: 1
          unit_of_measurement: s
          mode: box
