# RainPoint valve card — one card per zone, two conditional views.
#
# Paste into a Dashboard via "Add card → Manual" and edit the entity ids
# to match your install (see Developer Tools → States, filter "rainpoint").
#
# Idle view:    last cycle usage, then [slider]--[RUN] on one row.
# Running view: [MM:SS]--[STOP] on one row.
#
# Source of truth: the switch's state. The switch reads the companion
# `number.*_run_minutes` slider when it's flipped on. The "remaining"
# sensor is a live mm:ss string that ticks every second.

type: vertical-stack
cards:
  - type: conditional
    conditions:
      - entity: switch.htv213frf_sprinklers
        state: "off"
    card:
      type: vertical-stack
      cards:
        - type: entities
          title: Sprinklers
          entities:
            - entity: sensor.htv213frf_sprinklers_last_cycle_usage
              name: Last cycle usage
        - type: horizontal-stack
          cards:
            - type: tile
              entity: number.htv213frf_sprinklers_run_minutes
              name: Run for
              features:
                - type: numeric-input
                  style: slider
            - type: button
              entity: switch.htv213frf_sprinklers
              name: RUN
              icon: mdi:play-circle
              icon_height: 40px
              show_state: false
              tap_action:
                action: call-service
                service: switch.turn_on
                target:
                  entity_id: switch.htv213frf_sprinklers

  - type: conditional
    conditions:
      - entity: switch.htv213frf_sprinklers
        state: "on"
    card:
      type: horizontal-stack
      cards:
        - type: tile
          entity: sensor.htv213frf_sprinklers_remaining
          name: Sprinklers
          icon: mdi:timer-outline
        - type: button
          entity: switch.htv213frf_sprinklers
          name: STOP
          icon: mdi:stop-circle
          icon_height: 40px
          show_state: false
          tap_action:
            action: call-service
            service: switch.turn_off
            target:
              entity_id: switch.htv213frf_sprinklers
