# RainPoint valve card — one built-in entities card per zone, no HACS.
#
# Three states rendered via `type: conditional` rows:
#   - idle:      last-cycle usage + slider + RUN button
#   - running:   last-cycle usage + mm:ss countdown + STOP button
#   - cooldown:  (either state above) + a "Cooldown Xs" row instead of
#                the RUN/STOP button. Matches the ~15 s lockout the
#                phone app imposes after any control command.

type: entities
title: Sprinklers
state_color: true
entities:
  - entity: sensor.htv213frf_sprinklers_last_cycle_usage
    name: Last cycle usage

  # --- Idle: slider is always shown ---------------------------------
  - type: conditional
    conditions:
      - entity: switch.htv213frf_sprinklers
        state: "off"
    row:
      entity: number.htv213frf_sprinklers_run_minutes
      name: Run for

  # --- Running: live countdown always shown -------------------------
  - type: conditional
    conditions:
      - entity: switch.htv213frf_sprinklers
        state: "on"
    row:
      entity: sensor.htv213frf_sprinklers_remaining
      name: Running...

  # --- Action button, or a cooldown-countdown row --------------------
  # Cooldown takes priority when active, replacing the RUN/STOP button.
  - type: conditional
    conditions:
      - entity: sensor.htv213frf_sprinklers_cooldown
        state_not: "0"
    row:
      entity: sensor.htv213frf_sprinklers_cooldown
      name: Cooldown

  - type: conditional
    conditions:
      - entity: switch.htv213frf_sprinklers
        state: "off"
      - entity: sensor.htv213frf_sprinklers_cooldown
        state: "0"
    row:
      type: call-service
      name: " "
      action_name: RUN
      service: switch.turn_on
      service_data:
        entity_id: switch.htv213frf_sprinklers

  - type: conditional
    conditions:
      - entity: switch.htv213frf_sprinklers
        state: "on"
      - entity: sensor.htv213frf_sprinklers_cooldown
        state: "0"
    row:
      type: call-service
      name: " "
      action_name: STOP
      service: switch.turn_off
      service_data:
        entity_id: switch.htv213frf_sprinklers
