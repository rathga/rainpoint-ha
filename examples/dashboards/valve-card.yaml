# RainPoint valve card — one visually-unified card per zone.
#
# Requires the HACS frontend plugin "Stack In Card" (custom:stack-in-card):
#   HACS → Frontend → search "Stack In Card" → install → refresh.
#   https://github.com/custom-cards/stack-in-card
#
# Built-in cards alone can't merge borders between nested cards, which
# is why this pulls in one small HACS plugin. Everything else is stock.
#
# Layout:
#   always:  [title] Sprinklers
#            last-cycle usage
#   idle:    [slider             ] [RUN]
#   running: [MM:SS  Running...  ] [STOP]

type: custom:stack-in-card
mode: vertical
cards:
  # Always visible: title + last cycle. Stays during running, so you
  # always know which valve the card is for and can eyeball prior usage.
  - type: entities
    title: Sprinklers
    entities:
      - entity: sensor.htv213frf_sprinklers_last_cycle_usage
        name: Last cycle usage

  # Idle action row — slider + RUN button on one line.
  - type: conditional
    conditions:
      - entity: switch.htv213frf_sprinklers
        state: "off"
    card:
      type: horizontal-stack
      cards:
        - type: tile
          entity: number.htv213frf_sprinklers_run_minutes
          name: Run for
          features:
            - type: numeric-input
              style: slider
        - type: button
          entity: switch.htv213frf_sprinklers
          name: RUN
          icon: mdi:play-circle
          icon_height: 40px
          show_state: false
          tap_action:
            action: call-service
            service: switch.turn_on
            target:
              entity_id: switch.htv213frf_sprinklers

  # Running action row — live countdown + STOP button on one line.
  - type: conditional
    conditions:
      - entity: switch.htv213frf_sprinklers
        state: "on"
    card:
      type: horizontal-stack
      cards:
        - type: tile
          entity: sensor.htv213frf_sprinklers_remaining
          name: Running...
          icon: mdi:timer-outline
        - type: button
          entity: switch.htv213frf_sprinklers
          name: STOP
          icon: mdi:stop-circle
          icon_height: 40px
          show_state: false
          tap_action:
            action: call-service
            service: switch.turn_off
            target:
              entity_id: switch.htv213frf_sprinklers
