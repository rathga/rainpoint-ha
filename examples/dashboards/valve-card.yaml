# RainPoint valve card — one built-in entities card per zone, no HACS.
#
# Everything lives as rows inside a single `entities` card — including
# the state-dependent content, via `type: conditional` rows. Result: one
# card, one border, no internal dividers between areas.
#
# Trade-off: rows are vertically stacked, so the slider sits above the
# RUN button rather than beside it. If you want horizontal "slider +
# button" inside a truly borderless card, that requires the HACS plugin
# `card-mod` to strip nested-card backgrounds — ask and I'll ship that
# variant too.

type: entities
title: Sprinklers
state_color: true
entities:
  # --- Always visible -----------------------------------------------
  - entity: sensor.htv213frf_sprinklers_last_cycle_usage
    name: Last cycle usage

  # --- Idle rows ----------------------------------------------------
  - type: conditional
    conditions:
      - entity: switch.htv213frf_sprinklers
        state: "off"
    row:
      entity: number.htv213frf_sprinklers_run_minutes
      name: Run for
  - type: conditional
    conditions:
      - entity: switch.htv213frf_sprinklers
        state: "off"
    row:
      type: button
      name: Run now
      icon: mdi:play-circle
      action_name: RUN
      tap_action:
        action: call-service
        service: switch.turn_on
        target:
          entity_id: switch.htv213frf_sprinklers

  # --- Running rows -------------------------------------------------
  - type: conditional
    conditions:
      - entity: switch.htv213frf_sprinklers
        state: "on"
    row:
      entity: sensor.htv213frf_sprinklers_remaining
      name: Running...
  - type: conditional
    conditions:
      - entity: switch.htv213frf_sprinklers
        state: "on"
    row:
      type: button
      name: Cancel
      icon: mdi:stop-circle
      action_name: STOP
      tap_action:
        action: call-service
        service: switch.turn_off
        target:
          entity_id: switch.htv213frf_sprinklers
