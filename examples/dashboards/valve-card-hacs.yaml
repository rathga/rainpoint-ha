# RainPoint valve card — polished HACS-backed version.
#
# Five HACS frontend plugins required:
#   - mushroom            (HACS → Frontend → "Mushroom Cards")
#     https://github.com/piitaya/lovelace-mushroom
#   - stack-in-card       (HACS → Frontend → "Stack In Card")
#     https://github.com/custom-cards/stack-in-card
#   - card-mod            (HACS → Frontend → "card-mod")
#     https://github.com/thomasloven/lovelace-card-mod
#   - slider-entity-row   (HACS → Frontend → "slider-entity-row")
#     https://github.com/thomasloven/lovelace-slider-entity-row
#     (built-in number-entity row reserves ~30% for the name; this one
#     gives the slider the full leftover width.)
#   - decluttering-card   (HACS → Frontend → "Decluttering Card")
#     https://github.com/custom-cards/decluttering-card
#
# Layout per zone (one flat borderless card):
#   ┌──────────────────────────────────────────────────────────┐
#   │ 💧  Sprinklers                  Last cycle: 2.3 L         │
#   │ Run for   [══════════════slider═══════════════]  5  [RUN] │
#   └──────────────────────────────────────────────────────────┘
#
# The action button on the right is mushroom-template-card sized to its
# content (~80 px). It re-labels itself between RUN, STOP and "Xs"
# (cooldown) and dims while the cooldown sensor is non-zero. Identical
# slider+button row swaps to countdown+STOP when running.
#
# For the no-HACS version see valve-card.yaml in this directory.
#
# Paste the whole file into Dashboard → ⋯ → Edit → ⋯ → Raw configuration
# editor — `decluttering_templates:` must live at the top level (sibling
# of `views:`), not inside a view.

decluttering_templates:
  rainpoint_valve_card:
    default:
      - title: Zone
      - slug: sprinklers
    card:
      type: custom:stack-in-card
      mode: vertical
      # Defaults strip box_shadow/border/background of children but keep
      # the outer wrapper's card border. Don't add a global card_mod here
      # (it'll cascade to the outer ha-card and kill the wrapper border).
      cards:
        # Header — title + last cycle usage on the left, diagnostic
        # chips (signal + battery) on the right.
        - type: horizontal-stack
          card_mod:
            style: |
              #root {
                display: grid !important;
                grid-template-columns: 1fr auto !important;
                align-items: center;
              }
          cards:
            - type: custom:mushroom-template-card
              primary: "[[title]]"
              secondary: >-
                Last cycle: {{ states('sensor.htv213frf_[[slug]]_last_cycle_usage') }} L
              icon: mdi:water-pump
              icon_color: blue
              fill_container: true
              tap_action:
                action: none
              card_mod:
                style: |
                  ha-card {
                    background: transparent !important;
                    box-shadow: none !important;
                    border: none !important;
                  }
            - type: custom:mushroom-chips-card
              alignment: end
              chips:
                - type: template
                  entity: sensor.htv213frf_rf_rssi
                  icon: >-
                    {% set r = states('sensor.htv213frf_rf_rssi') | int(-100) %}
                    {% if r >= -60 %}mdi:signal-cellular-3
                    {% elif r >= -75 %}mdi:signal-cellular-2
                    {% else %}mdi:signal-cellular-1{% endif %}
                  icon_color: >-
                    {% set r = states('sensor.htv213frf_rf_rssi') | int(-100) %}
                    {% if r >= -60 %}green
                    {% elif r >= -75 %}amber
                    {% else %}red{% endif %}
                  content: ""
                  tap_action:
                    action: more-info
                - type: template
                  entity: binary_sensor.htv213frf_battery_low
                  icon: >-
                    {% if is_state('binary_sensor.htv213frf_battery_low', 'on') %}mdi:battery-alert-variant-outline
                    {% else %}mdi:battery{% endif %}
                  icon_color: >-
                    {% if is_state('binary_sensor.htv213frf_battery_low', 'on') %}red
                    {% else %}green{% endif %}
                  content: ""
                  tap_action:
                    action: more-info
              card_mod:
                style: |
                  ha-card {
                    background: transparent !important;
                    box-shadow: none !important;
                    border: none !important;
                    padding: 0 12px !important;
                  }

        # Idle row — slider + RUN button on one line.
        - type: conditional
          conditions:
            - entity: switch.htv213frf_[[slug]]
              state: "off"
          card:
            type: horizontal-stack
            # 3-column grid: label (content) | slider (1fr, fills) |
            # button (content). Label lives in its own cell so it can't
            # steal width from the slider — slider-entity-row's internal
            # .info column was the source of the "30 % allocation"
            # complaint, even with name="" it reserves space.
            card_mod:
              style: |
                #root {
                  display: grid !important;
                  grid-template-columns: max-content 1fr max-content auto !important;
                  gap: 8px;
                  align-items: center;
                }
            cards:
              # Cell 1: just the "Run for" label, content-sized.
              - type: custom:button-card
                show_icon: false
                show_state: false
                name: Run for
                styles:
                  card:
                    - background: transparent
                    - box-shadow: none
                    - border: none
                    - padding: 0 4px 0 16px
                    - font-size: 14px
                    - color: var(--secondary-text-color)
                    - height: auto
                    - cursor: default

              # Cell 2: slider only, takes the full grid cell.
              # full_row: true tells slider-entity-row to skip its
              # internal .info column entirely (value moves to its own
              # cell on the right so the slider gets the leftover space).
              # 6 px horizontal padding stops the slider knob from being
              # visually clipped against the adjacent grid cells when
              # dragged to either edge.
              - type: entities
                card_mod:
                  style: |
                    ha-card {
                      background: transparent !important;
                      box-shadow: none !important;
                      border: none !important;
                      padding: 0;
                    }
                    .card-content {
                      padding: 0 12px !important;
                    }
                entities:
                  - type: custom:slider-entity-row
                    entity: number.htv213frf_[[slug]]_run_minutes
                    full_row: true
                    hide_state: true   # value lives in its own grid cell

              # Cell 3: live value of the slider in minutes.
              - type: custom:button-card
                entity: number.htv213frf_[[slug]]_run_minutes
                show_icon: false
                show_name: false
                show_state: false
                name: ""
                custom_fields:
                  value: |
                    [[[ return Math.round(parseFloat(entity.state)) + ' min'; ]]]
                styles:
                  card:
                    - background: transparent
                    - box-shadow: none
                    - border: none
                    - padding: 0 4px
                    - font-size: 14px
                    - font-variant-numeric: tabular-nums
                    - color: var(--primary-text-color)
                    - min-width: 56px
                    - text-align: right
                    - height: auto
                    - cursor: default
                  custom_fields:
                    value:
                      - text-align: right
              - type: custom:button-card
                entity: switch.htv213frf_[[slug]]
                show_icon: true
                show_name: true
                show_state: false
                icon: mdi:play-circle
                name: |
                  [[[
                    const cd = states['sensor.htv213frf_[[slug]]_cooldown'];
                    if (cd && cd.state !== '0' && cd.state !== 'unknown' && cd.state !== 'unavailable') {
                      return cd.state + 's';
                    }
                    return 'RUN';
                  ]]]
                tap_action:
                  action: call-service
                  service: switch.turn_on
                  target:
                    entity_id: switch.htv213frf_[[slug]]
                styles:
                  card:
                    - background: "rgba(76, 175, 80, 0.18)"
                    - border-radius: 14px
                    - border: none
                    - box-shadow: none
                    - padding: 2px 10px 2px 8px
                    - height: auto
                    - min-height: 0
                    - transition: background 0.15s ease, transform 0.1s ease
                  grid:
                    - grid-template-areas: '"i n"'
                    - grid-template-columns: 20px 1fr
                    - grid-template-rows: 20px
                    - column-gap: 6px
                    - row-gap: 0
                    - align-items: center
                  img_cell:
                    - width: 20px
                    - height: 20px
                  icon:
                    - width: 20px
                    - height: 20px
                    - color: rgb(76, 175, 80)
                  name:
                    - justify-self: start
                    - font-weight: 600
                    - font-size: 13px
                    - letter-spacing: 0.3px
                    - color: var(--primary-text-color)
                state:
                  - operator: template
                    value: >
                      [[[
                        const cd = states['sensor.htv213frf_[[slug]]_cooldown'];
                        return cd && cd.state !== '0' && cd.state !== 'unknown' && cd.state !== 'unavailable';
                      ]]]
                    styles:
                      card:
                        - pointer-events: none
                        - opacity: 0.5
                card_mod:
                  style: |
                    ha-card {
                      background: rgba(76, 175, 80, 0.18) !important;
                      border-radius: 14px !important;
                      box-shadow: none !important;
                      border: none !important;
                    }
                    ha-card:hover {
                      background: rgba(76, 175, 80, 0.30) !important;
                    }
                    ha-card:active {
                      transform: scale(0.97);
                    }

        # Running row — live mm:ss countdown + STOP button on one line.
        - type: conditional
          conditions:
            - entity: switch.htv213frf_[[slug]]
              state: "on"
          card:
            type: horizontal-stack
            card_mod:
              style: |
                #root {
                  display: grid !important;
                  grid-template-columns: 1fr auto !important;
                  gap: 8px;
                  align-items: center;
                  min-height: 40px;
                  padding: 8px 0 !important;
                }
            cards:
              # Running label + countdown on ONE line via a custom:button-card
              # grid: [icon][Running...][4:32 remaining][(spacer)]. The spacer
              # makes the row fill the 1fr cell of the outer horizontal-stack
              # so STOP stays flush right.
              - type: custom:button-card
                show_name: false
                show_icon: false
                show_state: false
                custom_fields:
                  icon: >
                    <ha-icon icon="mdi:timer-outline"
                      style="color: rgb(var(--rgb-cyan, 8 208 208)); --mdc-icon-size: 22px;"></ha-icon>
                  label: Running...
                  countdown: |
                    [[[
                      const s = states['sensor.htv213frf_[[slug]]_remaining'];
                      return (s && s.state && s.state !== 'unknown' ? s.state + ' remaining' : '…');
                    ]]]
                styles:
                  card:
                    - background: transparent !important
                    - box-shadow: none !important
                    - border: none !important
                    - padding: 0 12px !important
                    - height: auto
                    - cursor: default
                  grid:
                    - grid-template-areas: '"icon label countdown filler"'
                    - grid-template-columns: auto auto auto 1fr
                    - gap: 10px
                    - align-items: center
                  custom_fields:
                    icon:
                      - justify-self: start
                    label:
                      - justify-self: start
                      - font-weight: 500
                      - font-size: 14px
                      - color: var(--primary-text-color)
                    countdown:
                      - justify-self: start
                      - font-size: 14px
                      - color: var(--secondary-text-color)
                      - font-variant-numeric: tabular-nums
              - type: custom:button-card
                entity: switch.htv213frf_[[slug]]
                show_icon: true
                show_name: true
                show_state: false
                icon: mdi:stop-circle
                name: |
                  [[[
                    const cd = states['sensor.htv213frf_[[slug]]_cooldown'];
                    if (cd && cd.state !== '0' && cd.state !== 'unknown' && cd.state !== 'unavailable') {
                      return cd.state + 's';
                    }
                    return 'STOP';
                  ]]]
                tap_action:
                  action: call-service
                  service: switch.turn_off
                  target:
                    entity_id: switch.htv213frf_[[slug]]
                styles:
                  card:
                    - background: "rgba(244, 67, 54, 0.18)"
                    - border-radius: 14px
                    - border: none
                    - box-shadow: none
                    - padding: 2px 10px 2px 8px
                    - height: auto
                    - min-height: 0
                    - transition: background 0.15s ease, transform 0.1s ease
                  grid:
                    - grid-template-areas: '"i n"'
                    - grid-template-columns: 20px 1fr
                    - grid-template-rows: 20px
                    - column-gap: 6px
                    - row-gap: 0
                    - align-items: center
                  img_cell:
                    - width: 20px
                    - height: 20px
                  icon:
                    - width: 20px
                    - height: 20px
                    - color: rgb(244, 67, 54)
                  name:
                    - justify-self: start
                    - font-weight: 600
                    - font-size: 13px
                    - letter-spacing: 0.3px
                    - color: var(--primary-text-color)
                state:
                  - operator: template
                    value: >
                      [[[
                        const cd = states['sensor.htv213frf_[[slug]]_cooldown'];
                        return cd && cd.state !== '0' && cd.state !== 'unknown' && cd.state !== 'unavailable';
                      ]]]
                    styles:
                      card:
                        - pointer-events: none
                        - opacity: 0.5
                card_mod:
                  style: |
                    ha-card {
                      background: rgba(244, 67, 54, 0.18) !important;
                      border-radius: 14px !important;
                      box-shadow: none !important;
                      border: none !important;
                    }
                    ha-card:hover {
                      background: rgba(244, 67, 54, 0.30) !important;
                    }
                    ha-card:active {
                      transform: scale(0.97);
                    }

views:
  - title: Irrigation
    cards:
      - type: custom:decluttering-card
        template: rainpoint_valve_card
        variables:
          - title: Sprinklers
          - slug: sprinklers
      - type: custom:decluttering-card
        template: rainpoint_valve_card
        variables:
          - title: Dripline
          - slug: dripline
