# RainPoint valve card — polished HACS-backed version.
#
# Two HACS frontend plugins required:
#   - decluttering-card  (HACS → Frontend → "Decluttering Card")
#     https://github.com/custom-cards/decluttering-card
#   - button-card        (HACS → Frontend → "button-card")
#     https://github.com/custom-cards/button-card
#
# A single template in decluttering_templates is instantiated once per
# zone in the view. Slider/countdown sit on the same row as a compact
# 90 px-wide action button whose label flips between RUN, STOP and
# "Xs" (cooldown) and dims while cooldown is non-zero.
#
# For the built-in-cards-only version, see valve-card.yaml in the same
# directory.
#
# Paste the whole file into Dashboard → ⋯ → Edit → ⋯ → Raw configuration
# editor. The `decluttering_templates:` block needs to live at the
# top level of the dashboard config (sibling of `views:`), not inside
# a view.

decluttering_templates:
  rainpoint_valve_card:
    default:
      - title: Zone
      - slug: sprinklers
    card:
      type: vertical-stack
      cards:
        # Header + always-visible info.
        - type: entities
          title: "[[title]]"
          state_color: true
          entities:
            - entity: sensor.htv213frf_[[slug]]_last_cycle_usage
              name: Last cycle usage

        # ---- Idle: slider + RUN button on one row ----
        - type: conditional
          conditions:
            - entity: switch.htv213frf_[[slug]]
              state: "off"
          card:
            type: horizontal-stack
            cards:
              - type: tile
                entity: number.htv213frf_[[slug]]_run_minutes
                name: Run for
                features:
                  - type: numeric-input
                    style: slider
              - type: custom:button-card
                entity: switch.htv213frf_[[slug]]
                show_icon: false
                show_state: false
                name: |
                  [[[
                    const cd = states['sensor.htv213frf_[[slug]]_cooldown'];
                    if (cd && cd.state !== '0' && cd.state !== 'unknown' && cd.state !== 'unavailable') {
                      return cd.state + 's';
                    }
                    return 'RUN';
                  ]]]
                tap_action:
                  action: call-service
                  service: switch.turn_on
                  service_data:
                    entity_id: switch.htv213frf_[[slug]]
                styles:
                  card:
                    - width: 90px
                    - height: 56px
                    - margin: 0 0 0 auto
                    - font-size: 14px
                    - font-weight: 600
                    - letter-spacing: 1px
                    - border-radius: 12px
                state:
                  - operator: template
                    value: >
                      [[[
                        const cd = states['sensor.htv213frf_[[slug]]_cooldown'];
                        return cd && cd.state !== '0' && cd.state !== 'unknown' && cd.state !== 'unavailable';
                      ]]]
                    styles:
                      card:
                        - pointer-events: none
                        - opacity: 0.5

        # ---- Running: countdown + STOP button on one row ----
        - type: conditional
          conditions:
            - entity: switch.htv213frf_[[slug]]
              state: "on"
          card:
            type: horizontal-stack
            cards:
              - type: tile
                entity: sensor.htv213frf_[[slug]]_remaining
                name: Running...
                icon: mdi:timer-outline
              - type: custom:button-card
                entity: switch.htv213frf_[[slug]]
                show_icon: false
                show_state: false
                name: |
                  [[[
                    const cd = states['sensor.htv213frf_[[slug]]_cooldown'];
                    if (cd && cd.state !== '0' && cd.state !== 'unknown' && cd.state !== 'unavailable') {
                      return cd.state + 's';
                    }
                    return 'STOP';
                  ]]]
                tap_action:
                  action: call-service
                  service: switch.turn_off
                  service_data:
                    entity_id: switch.htv213frf_[[slug]]
                styles:
                  card:
                    - width: 90px
                    - height: 56px
                    - margin: 0 0 0 auto
                    - font-size: 14px
                    - font-weight: 600
                    - letter-spacing: 1px
                    - border-radius: 12px
                state:
                  - operator: template
                    value: >
                      [[[
                        const cd = states['sensor.htv213frf_[[slug]]_cooldown'];
                        return cd && cd.state !== '0' && cd.state !== 'unknown' && cd.state !== 'unavailable';
                      ]]]
                    styles:
                      card:
                        - pointer-events: none
                        - opacity: 0.5

views:
  - title: Irrigation
    cards:
      - type: custom:decluttering-card
        template: rainpoint_valve_card
        variables:
          - title: Sprinklers
          - slug: sprinklers
      - type: custom:decluttering-card
        template: rainpoint_valve_card
        variables:
          - title: Dripline
          - slug: dripline
