# RainPoint valve card — polished HACS-backed version.
#
# Four HACS frontend plugins required:
#   - mushroom            (HACS → Frontend → "Mushroom Cards")
#     https://github.com/piitaya/lovelace-mushroom
#   - stack-in-card       (HACS → Frontend → "Stack In Card")
#     https://github.com/custom-cards/stack-in-card
#   - card-mod            (HACS → Frontend → "card-mod")
#     https://github.com/thomasloven/lovelace-card-mod
#     (used to constrain button width inside horizontal-stack and to
#     disable the button while in cooldown — mushroom integrates with it.)
#   - decluttering-card   (HACS → Frontend → "Decluttering Card")
#     https://github.com/custom-cards/decluttering-card
#
# Layout per zone (one flat borderless card):
#   ┌──────────────────────────────────────────────────────────┐
#   │ 💧  Sprinklers                  Last cycle: 2.3 L         │
#   │ Run for   [══════════════slider═══════════════]  5  [RUN] │
#   └──────────────────────────────────────────────────────────┘
#
# The action button on the right is mushroom-template-card sized to its
# content (~80 px). It re-labels itself between RUN, STOP and "Xs"
# (cooldown) and dims while the cooldown sensor is non-zero. Identical
# slider+button row swaps to countdown+STOP when running.
#
# For the no-HACS version see valve-card.yaml in this directory.
#
# Paste the whole file into Dashboard → ⋯ → Edit → ⋯ → Raw configuration
# editor — `decluttering_templates:` must live at the top level (sibling
# of `views:`), not inside a view.

decluttering_templates:
  rainpoint_valve_card:
    default:
      - title: Zone
      - slug: sprinklers
    card:
      type: custom:stack-in-card
      mode: vertical
      keep:
        background: true
      cards:
        # Header — title + last cycle usage in one mushroom row.
        - type: custom:mushroom-template-card
          primary: "[[title]]"
          secondary: >-
            Last cycle: {{ states('sensor.htv213frf_[[slug]]_last_cycle_usage') }} L
          icon: mdi:water-pump
          icon_color: blue
          fill_container: true
          tap_action:
            action: none

        # Idle row — slider + RUN button on one line.
        - type: conditional
          conditions:
            - entity: switch.htv213frf_[[slug]]
              state: "off"
          card:
            type: horizontal-stack
            cards:
              - type: custom:mushroom-number-card
                entity: number.htv213frf_[[slug]]_run_minutes
                name: Run for
                icon_type: none
                display_mode: slider
                fill_container: true
              - type: custom:mushroom-template-card
                primary: >-
                  {% set cd = states('sensor.htv213frf_[[slug]]_cooldown') %}
                  {% if cd not in ['0','unknown','unavailable'] %}
                    {{ cd }}s
                  {% else %}
                    RUN
                  {% endif %}
                icon: mdi:play-circle
                icon_color: >-
                  {% if states('sensor.htv213frf_[[slug]]_cooldown') not in ['0','unknown','unavailable'] %}
                    disabled
                  {% else %}
                    green
                  {% endif %}
                tap_action:
                  action: call-service
                  service: switch.turn_on
                  target:
                    entity_id: switch.htv213frf_[[slug]]
                fill_container: false
                card_mod:
                  style: |
                    ha-card {
                      width: 110px !important;
                      flex: 0 0 110px !important;
                      pointer-events: {{ "none" if states('sensor.htv213frf_[[slug]]_cooldown') not in ['0','unknown','unavailable'] else "auto" }};
                      opacity: {{ "0.5" if states('sensor.htv213frf_[[slug]]_cooldown') not in ['0','unknown','unavailable'] else "1" }};
                    }

        # Running row — live mm:ss countdown + STOP button on one line.
        - type: conditional
          conditions:
            - entity: switch.htv213frf_[[slug]]
              state: "on"
          card:
            type: horizontal-stack
            cards:
              - type: custom:mushroom-template-card
                primary: Running...
                secondary: >-
                  {{ states('sensor.htv213frf_[[slug]]_remaining') }} remaining
                icon: mdi:timer-outline
                icon_color: cyan
                fill_container: true
                tap_action:
                  action: none
              - type: custom:mushroom-template-card
                primary: >-
                  {% set cd = states('sensor.htv213frf_[[slug]]_cooldown') %}
                  {% if cd not in ['0','unknown','unavailable'] %}
                    {{ cd }}s
                  {% else %}
                    STOP
                  {% endif %}
                icon: mdi:stop-circle
                icon_color: >-
                  {% if states('sensor.htv213frf_[[slug]]_cooldown') not in ['0','unknown','unavailable'] %}
                    disabled
                  {% else %}
                    red
                  {% endif %}
                tap_action:
                  action: call-service
                  service: switch.turn_off
                  target:
                    entity_id: switch.htv213frf_[[slug]]
                fill_container: false
                card_mod:
                  style: |
                    ha-card {
                      width: 110px !important;
                      flex: 0 0 110px !important;
                      pointer-events: {{ "none" if states('sensor.htv213frf_[[slug]]_cooldown') not in ['0','unknown','unavailable'] else "auto" }};
                      opacity: {{ "0.5" if states('sensor.htv213frf_[[slug]]_cooldown') not in ['0','unknown','unavailable'] else "1" }};
                    }

views:
  - title: Irrigation
    cards:
      - type: custom:decluttering-card
        template: rainpoint_valve_card
        variables:
          - title: Sprinklers
          - slug: sprinklers
      - type: custom:decluttering-card
        template: rainpoint_valve_card
        variables:
          - title: Dripline
          - slug: dripline
